services:
  - type: web
    name: duplens-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://dup-lens-ai.vercel.app,https://*.vercel.app,http://localhost:3000
